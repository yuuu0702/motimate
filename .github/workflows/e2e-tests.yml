name: Flutter Web E2E Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    # 毎日午前2時（UTC）に実行
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_browsers:
        description: 'テストするブラウザ (chromium, firefox, webkit, all)'
        required: false
        default: 'chromium'
      skip_install:
        description: '依存関係のインストールをスキップ'
        type: boolean
        required: false
        default: false

env:
  FLUTTER_VERSION: '3.24.x'
  NODE_VERSION: '18'

jobs:
  test:
    name: E2E Tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Flutter doctor
      run: flutter doctor -v
      
    - name: Get Flutter dependencies
      run: flutter pub get
      
    - name: Install Node.js dependencies
      if: ${{ !inputs.skip_install }}
      run: npm install
      
    - name: Install Playwright Browsers
      if: ${{ !inputs.skip_install }}
      run: npx playwright install --with-deps
      
    - name: Build Flutter Web
      run: flutter build web --web-renderer html --release --dart-define=FLUTTER_WEB_AUTO_DETECT=true
      
    - name: Run Playwright Tests (All browsers)
      if: ${{ inputs.test_browsers == 'all' || inputs.test_browsers == '' }}
      run: npx playwright test
      
    - name: Run Playwright Tests (Chromium only)
      if: ${{ inputs.test_browsers == 'chromium' }}
      run: npx playwright test --project=chromium
      
    - name: Run Playwright Tests (Firefox only)
      if: ${{ inputs.test_browsers == 'firefox' }}
      run: npx playwright test --project=firefox
      
    - name: Run Playwright Tests (WebKit only)
      if: ${{ inputs.test_browsers == 'webkit' }}
      run: npx playwright test --project=webkit
      
    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-${{ matrix.os }}
        path: playwright-report/
        retention-days: 30
        
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.os }}
        path: test-results/
        retention-days: 30

  mobile-test:
    name: Mobile E2E Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Get Flutter dependencies
      run: flutter pub get
      
    - name: Install Node.js dependencies
      run: npm install
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Build Flutter Web
      run: flutter build web --web-renderer html --release --dart-define=FLUTTER_WEB_AUTO_DETECT=true
      
    - name: Run Mobile Tests
      run: npx playwright test --project="Mobile Chrome" --project="Mobile Safari"
      
    - name: Upload Mobile Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: mobile-test-results
        path: test-results/
        retention-days: 30

  performance-test:
    name: Performance Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Get Flutter dependencies
      run: flutter pub get
      
    - name: Install Node.js dependencies
      run: npm install
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Build Flutter Web (Performance optimized)
      run: flutter build web --web-renderer html --release --dart-define=FLUTTER_WEB_AUTO_DETECT=true --dart-define=FLUTTER_WEB_USE_SKIA=false
      
    - name: Run Performance Tests
      run: npx playwright test tests/performance.spec.js
      
    - name: Upload Performance Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: performance-test-results
        path: test-results/
        retention-days: 30

  accessibility-test:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Get Flutter dependencies
      run: flutter pub get
      
    - name: Install Node.js dependencies
      run: npm install
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Install axe-playwright
      run: npm install --save-dev @axe-core/playwright
      
    - name: Build Flutter Web
      run: flutter build web --web-renderer html --release --dart-define=FLUTTER_WEB_AUTO_DETECT=true
      
    - name: Run Accessibility Tests
      run: |
        npx playwright test tests/basic.spec.js \
          --grep "アクセシビリティ" || echo "アクセシビリティテストをスキップ"
      
    - name: Upload Accessibility Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: accessibility-test-results
        path: test-results/
        retention-days: 30

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test, mobile-test, performance-test, accessibility-test]
    if: always()
    
    steps:
    - name: Download all test artifacts
      uses: actions/download-artifact@v4
      with:
        path: all-test-results
        
    - name: Generate Test Summary
      run: |
        echo "# Flutter Web E2E Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "## Test Results" >> $GITHUB_STEP_SUMMARY
        echo "- **Desktop Tests**: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Mobile Tests**: ${{ needs.mobile-test.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Performance Tests**: ${{ needs.performance-test.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Accessibility Tests**: ${{ needs.accessibility-test.result }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "テストレポートとスクリーンショットはArtifactsからダウンロードできます。" >> $GITHUB_STEP_SUMMARY
        
    - name: Comment PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const { owner, repo } = context.repo;
          const pr_number = context.payload.pull_request.number;
          
          const summary = `## 🧪 E2E Test Results
          
          | Test Type | Result |
          |-----------|--------|
          | Desktop Tests | ${{ needs.test.result }} |
          | Mobile Tests | ${{ needs.mobile-test.result }} |
          | Performance Tests | ${{ needs.performance-test.result }} |
          | Accessibility Tests | ${{ needs.accessibility-test.result }} |
          
          📊 [詳細なレポートはArtifactsからご確認ください](${context.payload.pull_request.html_url}/checks)`;
          
          github.rest.issues.createComment({
            owner,
            repo,
            issue_number: pr_number,
            body: summary
          });